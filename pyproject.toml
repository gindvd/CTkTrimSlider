[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "CTkTrimSlider"
version = "0.1.0"
description = "A video trim slider widget for customtkinter"
readme = "README.md"
authors = [
  {name = "David Gingerich", email = "gingerichdvd@gmail.com"}
]
requires-python = ">=3.11"

dependencies = [
  "customtkinter==5.2.2",
  "darkdetect==0.8.0",
  "packaging==26.0",
]

[project.optional-dependencies]
dev = [
  "mypy==1.19.1",
]

[tool.mypy]
strict = false

[[tool.mypy.overrides]]
module = [
  "customtkinter",
  "customtkinter.*",
]
ignore_missing_imports = true